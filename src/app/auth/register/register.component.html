<div class="flex">
    <div class="card">
      <div class="row">
        <div class="header">
          <h3><i class="pi pi-user" style="font-size: 3.0rem"></i></h3>
          <h3>InnovaTransit</h3>
        </div>
        <div class="col-12 col-md-8 offset-md-2">
          <form [formGroup]="primeiroAcessoForm" (ngSubmit)="enviarEmail()">
            <div class="mb-3">
              <label for="email">Usuário</label>
              <input
                id="email"
                type="text"
                pInputText
                class="form-control"
                formControlName="email"
                required
              />
            </div>
            <div class="mb-3 botao">
              <button
                type="submit"
                class="btn btn-success"
                [disabled]="primeiroAcessoForm.invalid">
                Enviar
              </button>
            </div>
            <!-- Exibe a mensagem de erro ou sucesso 
            <div *ngIf="mensagem" style="color: red;">
              {{ mensagem }}
            </div>-->
          </form>
        </div>
      </div>
    </div>
  </div>
